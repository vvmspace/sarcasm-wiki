{{ define "main" }}
<div style="text-align: center; padding: 10rem 2rem;">
    <h1 style="font-size: 15rem; line-height: 1; letter-spacing: -15px; margin-bottom: 2rem; background: linear-gradient(to bottom, var(--text-main), var(--border)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404.</h1>
    <p style="font-size: 2.5rem; font-weight: 800; font-family: 'Outfit', sans-serif; margin-bottom: 1rem; color: var(--text-main);">Congratulations, you've reached... nothing.</p>
    <p style="font-size: 1.25rem; color: var(--text-dim); max-width: 600px; margin: 0 auto 3rem; font-style: italic;">
        &ldquo;The page you're searching for doesn't exist. Kind of like the hope in this wiki. Perhaps you should try the home portal, or just stare at the void for a while.&rdquo;
    </p>
    <a href="/" style="display: inline-block; background: var(--accent); color: white; text-decoration: none; padding: 1rem 2.5rem; border-radius: 50px; font-weight: 700; transform: scale(1); transition: transform 0.2s, background 0.2s;" onmouseover="this.style.transform='scale(1.05)'; this.style.background='#8b5cf6';" onmouseout="this.style.transform='scale(1)'; this.style.background='var(--accent)';" >
        Return to Human Hub &rarr;
    </a>
</div>
{{ end }}
